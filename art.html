<!DOCTYPE html>
<html lang="en">
<head>
	<link href='https://fonts.googleapis.com/css?family=Quicksand:400,500,600|Source+Sans+Pro:400,400i,600,600i|Montserrat' rel='stylesheet' />
	<link rel="stylesheet" href="css/fontawesome.css" />
	<link rel="stylesheet" href="css/style.css" />
	<link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico?" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	
	<title>Portfolio | rocio.jgo</title>
	<meta property="og:title" content="Portfolio | rocio.jgo" />
	<meta property="og:image" content="images/il/img1.jpg" />
	<meta name="description" content="Traditional and digital illustration" />
	<meta property="og:description" content="Traditional and digital illustration" />
	<meta name="twitter:card" content="summary" />
	
<style>
body {
	font: normal 400 15px Montserrat, sans-serif !important; 
	line-height: 2 !important;
}

main {
	max-width: 95% !important;
}

.menu {
	display: block;
	margin: 15px 16px;
	text-align: center;
}

.menu .lang{
	color: #a1a1a1;
	text-decoration: none;
	padding: 5px 10px;
	border: 1px solid #a1a1a1;
	font: normal 400 14px Montserrat, sans-serif;
	letter-spacing: 2px;
	margin: 20px;
}

.menu .lang:hover{
	color: white;
	background: #30302e;
	border: 1px solid #30302e;
}
	
.gallery {
	width: 90%;
	margin: auto;
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
	grid-gap: 30px;
}

.gallery img {
	width: 100%;
	cursor: pointer;
	transition: 0.4s;
	pointer-events: auto !important;
}

.gallery img:hover {
	filter: brightness(75%);
	/*transform: scale(1.1);*/
}

.full-img {
	width: 100%;
	height: 100vh;
	background: rgba(0,0,0,0.9);
	position: fixed;
	top: 0;
	left: 0;
	display: none;
	align-items: center;
	justify-content: center;
	z-index: 5;
}

.full-img img {
	width: 90%;
	max-width: 500px;
	pointer-events: none;
}

.full-img span{
	position: absolute;
	top: 5%;
	right: 5%;
	font-size: 40px;
	color: white;
	cursor: pointer;
}

.ribbon {
	margin: 20px;
	font-size: 22px;
	word-spacing: 20px;
}

.ribbon a {
	color: black;
}

.ribbon a:hover {
	color: #a1a1a1;
}

</style>
</head>

<body>
<main>
<h1 style="font-size: 34px; font-weight: 500; text-align: center; margin-bottom: 50px;">rocio.jgo</h1>
<div class="menu">
<a href="/arte" class="lang" style="text-align: center;">ESPAÑOL</a>
</div>
<div class="row" style="max-width: 940px; margin: auto;">
<div class="col-12">
I make scientific and artistic illustrations, below are some of them. Do you want an illustration for your project, thesis, article or artwork to decorate your home? Contact me:<br /> 
<div style="text-align: center;"><i class="far fa-envelope"></i> <span> </span> rocio.j.guzman@gmail.com</div>
</div>
</div>

<div class="row" style="margin-top: 5%;">
<div class="col-2"><h1 style="font-weight: 400;">Traditional</h1></div>
<div class="col-10">
	<div class="full-img" id="fullImgBox">
		<img src="images/img.jpg" id="fullImg">
		<span onclick="closeFullImg()">×</span>
	</div>
	
	<div class="gallery">
		<img src="images/il/img1.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="images/il/img2.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="images/il/img3.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="images/il/img4.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="images/il/img5.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="images/il/img6.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
	</div>
</div>
</div>

<div class="row" style="margin-top: 5%;">
<div class="col-2"><h1 style="font-weight: 400;">Digital (Vectors)</h1></div>
<div class="col-10">
	<div class="full-img" id="fullImgBox">
		<img src="images/img.jpg" id="fullImg">
		<span onclick="closeFullImg()">×</span>
	</div>
	
	<div class="gallery">
		<img src="images/il/img7.png" onclick="openFullImg(this.src)">
		<img src="images/il/img8.png" onclick="openFullImg(this.src)">
		<img src="images/il/img9.png" onclick="openFullImg(this.src)">
	</div>
</div>
</div> 
<br />

<script>
var fullImgBox = document.getElementById("fullImgBox");
var fullImg = document.getElementById("fullImg");

function openFullImg(image) {
    fullImgBox.style.display = "flex";
    fullImg.src = image;
}
function closeFullImg() {
    fullImgBox.style.display = "none";
}
</script>

</main>
<div class="ribbon" style="display: block; text-align: center;">
	<a href="https://instagram.com/rocio.jgo"><i class="fab fa-instagram"></i></a> 
	<a href="https://rociojgo.tumblr.com"><i class="fab fa-tumblr"></i></a>	
	<br /><br />
</div>
</body>
</html>
