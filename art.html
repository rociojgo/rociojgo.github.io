<!DOCTYPE html>
<html lang="en">
<head>
	<link href='https://fonts.googleapis.com/css?family=Quicksand:400,500,600|Source+Sans+Pro:400,400i,600,600i|Raleway|Montserrat' rel='stylesheet' />
	<link rel="stylesheet" href="css/fontawesome.css" />
	<link rel="stylesheet" href="css/style.css" />
	<link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico?" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	
	<title>Portfolio | rocio.jgo</title>
	<meta property="og:title" content="Portfolio | rocio.jgo" />
	<meta property="og:image" content="images/il/thumb-il.jpg" />
	<meta name="description" content="Traditional and digital illustration" />
	<meta property="og:description" content="Traditional and digital illustration" />
	<meta name="twitter:card" content="summary" />
	
<style>
body {
	font: normal 400 15px Montserrat, sans-serif; 
	line-height: 2;
}

@media only screen and (max-width: 800px) {
	body {font-size: 17px;}
	.menu .lang {ont-size: 15px;}
}

.titulo {
	font: normal 500 45px Raleway, sans-serif;
	text-align: center;
	margin-top: 50px;
	padding: 10px;
}

main {
	max-width: 95% !important;
}

.menu {
	display: block;
	margin: 15px 16px;
	text-align: center;
}

.menu a {
	font: normal 500 18px Montserrat, sans-serif;
	padding: 10px;
	color: gray;
	text-decoration: none;
	line-height: 30px;
}

.menu a:hover{
	color: #30302e;
}

.menu a.fol {
	padding-left: 20px;
	font-size: 20px !important;
	word-spacing: 20px;
}

.menu a.fol:hover {
	border-bottom: 1px solid white !important;
}

.col-10 {
	float: none!important;
	margin: auto;
	padding: 0;
}

.gallery {
	width: 90%;
	margin: auto;
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
	grid-gap: 30px;
}

.gallery img {
	width: 100%;
	cursor: pointer;
	transition: 0.4s;
	pointer-events: auto !important;
}

.gallery img:hover {
	filter: brightness(75%);
	/*transform: scale(1.1);*/
}

.full-img {
	width: 100%;
	height: 100vh;
	background: rgba(0,0,0,0.7);
	position: fixed;
	top: 0;
	left: 0;
	display: none;
	align-items: center;
	justify-content: center;
	z-index: 5;
}

.full-img img {
	width: 90%;
	max-width: 500px;
	pointer-events: none;
}

.full-img .close{
	position: absolute;
	top: 5%;
	right: 10%;
	font-size: 40px;
	color: white;
	cursor: pointer;
	z-index: 10000;
}
</style>
</head>

<body>
<main>
<div class="titulo">rocio.jgo</div>
<div class="menu">
	<!--a href="#">Ilustraciones</a>
	<a href="/art/about">Info & Contact</a-->
	<a href="https://instagram.com/chio.jgo" class="fol"><i class="fab fa-instagram"></i></a> 
	<a href="https://chio-jgo.tumblr.com" class="fol"><i class="fab fa-tumblr"></i></a>
	
</div>
<div class="row" style="margin-top: 5%;">
<div class="col-10">
	<div class="full-img" id="fullImgBox">
		<img src="images/img.jpg" id="fullImg">
		<span class="close" onclick="closeFullImg()">×</span>
	</div>
	
	<div class="gallery">
		<img src="/images/il/img1.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="/images/il/img2.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="/images/il/img3.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="/images/il/img4.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="/images/il/img5.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
		<img src="/images/il/img6.jpg" onclick="openFullImg(this.src)" oncontextmenu="return false;">
	</div>


<div style="margin-top: 100px;">
	<div class="full-img" id="fullImgBox">
		<img src="images/img.jpg" id="fullImg">
		<span onclick="closeFullImg()">×</span>
	</div>
	
	<div class="gallery">
		<img src="/images/il/img7.png" onclick="openFullImg(this.src)">
		<img src="/images/il/img8.png" onclick="openFullImg(this.src)">
		<img src="/images/il/img9.png" onclick="openFullImg(this.src)">
	</div>
</div> 
</div>
</div>
<br />

<script>
var fullImgBox = document.getElementById("fullImgBox");
var fullImg = document.getElementById("fullImg");

function openFullImg(image) {
    fullImgBox.style.display = "flex";
    fullImg.src = image;
}
function closeFullImg() {
    fullImgBox.style.display = "none";
}
</script>

</main>
</body>
</html>
